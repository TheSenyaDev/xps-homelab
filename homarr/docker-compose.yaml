services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3000:3000
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    user: "1000:127"
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=192.168.2.100:3000
      - HOMEPAGE_VAR_PORTAINER_API_KEY=${PORTAINER_API_KEY}
    labels:
      - "gethomepage.dev/enabled=true"
      - "gethomepage.dev/name=Homepage"
      - "gethomepage.dev/group=Docker Containers"
      - "gethomepage.dev/icon=homepage.png"
      - "gethomepage.dev/description=Dashboard UI"
      - "gethomepage.dev/showStats=true"
      - "gethomepage.dev/href=http://192.168.2.100:3000"
    restart: unless-stopped
