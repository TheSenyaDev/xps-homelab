services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: homarr
    ports:
      - 3000:7575
    volumes:
      - ./homarr/configs:/app/data/configs
      - ./homarr/icons:/app/public/icons
      - ./homarr/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
    restart: unless-stopped

  glances:
    image: nicolargo/glances:latest
    container_name: glances
    ports:
      - 61208:61208
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - GLANCES_OPT=-w
    pid: host
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    restart: unless-stopped

  power-api:
    image: python:3.12-alpine
    container_name: power-api
    ports:
      - 8081:8081
    volumes:
      - ./power-api/server.py:/server.py:ro
      - /sys:/sys:ro
    privileged: true
    command: python /server.py
    restart: unless-stopped

  claude:
    image: lscr.io/linuxserver/chromium:latest
    container_name: claude
    ports:
      - 3003:3000
    volumes:
      - ./claude-code/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - CUSTOM_USER=${CLAUDE_USER}
      - PASSWORD=${CLAUDE_PASSWORD}
      - CHROME_CLI=https://claude.ai
    shm_size: 1gb
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate --protocol http2 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    restart: unless-stopped

  # Reverse proxy. cloudflared sends public traffic here; Traefik routes by
  # hostname (see traefik/dynamic/routes.yml) and selectively enforces Authelia
  # login. Routing is file-based, so Traefik needs no docker socket. See
  # authelia/README.md.
  traefik:
    image: traefik:v3.5
    container_name: traefik
    ports:
      - "8095:80"     # proxy entry — local testing; cloudflared uses http://traefik:80 internally
      - "8096:8080"   # Traefik dashboard (LAN/Tailscale only; never given a public hostname)
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    restart: unless-stopped

  # Authentication portal + forward-auth backend. Traefik consults it only for
  # routes carrying the `authelia@file` middleware (opt-in per service).
  authelia:
    image: authelia/authelia:4.38
    container_name: authelia
    # Run as the host user so the bind-mounted ./authelia (config + sqlite db)
    # stays editable on the host instead of being chowned to root.
    user: "${PUID}:${PGID}"
    volumes:
      - ./authelia:/config
    environment:
      - TZ=${TZ}
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}
    restart: unless-stopped

  # Demo service proving the whole chain works (login → forward-auth → app).
  # It is protected via the authelia@file middleware in routes.yml.
  # Delete this service (and its entries in routes.yml) once verified.
  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    restart: unless-stopped

  nvidia-api:
    image: python:3.12-slim
    container_name: nvidia-api
    ports:
      - 8083:8083
    volumes:
      - ./nvidia-api/server.py:/server.py:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:ro
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:ro
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools
    command: python /server.py
    restart: unless-stopped

  tailscale-api:
    image: python:3.12-alpine
    container_name: tailscale-api
    ports:
      - 8082:8082
    volumes:
      - ./tailscale-api/server.py:/server.py:ro
      - /var/run/tailscale/tailscaled.sock:/var/run/tailscale/tailscaled.sock:ro
    command: python /server.py
    restart: unless-stopped

  obsidian-remote:
    image: ghcr.io/sytone/obsidian-remote:latest
    container_name: obsidian-remote
    ports:
      - 8080:8080
    volumes:
      - ./obsidian/vaults:/vaults
      - ./obsidian/config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    restart: unless-stopped

  # CouchDB backend for Obsidian "Self-hosted LiveSync": sync one vault across all
  # your devices (desktop, phone, the browser instance above). Install the
  # Self-hosted LiveSync community plugin on each device and point it here.
  # Config (auth + CORS + sizes) is in obsidian-couchdb/local.ini. See its README.
  obsidian-couchdb:
    image: couchdb:3
    container_name: obsidian-couchdb
    ports:
      - "5984:5984"
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - ./obsidian-couchdb/data:/opt/couchdb/data
      # Mounted (read-write) as 00-livesync.ini for two reasons:
      #  - rw: the entrypoint chown/chmods everything under /opt/couchdb/etc on
      #    boot; a :ro mount makes that fail and aborts startup.
      #  - 00- prefix: sorts before the image's docker.ini, so CouchDB's runtime
      #    config write-target is docker.ini (in-container, admin re-seeded from
      #    env each boot) — keeping secrets OUT of this versioned file.
      - ./obsidian-couchdb/local.ini:/opt/couchdb/etc/local.d/00-livesync.ini
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - 3001:3001
    volumes:
      - ./uptime-kuma/data:/app/data
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - 4000:8080
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://${SERVER_IP}:4000/
    restart: unless-stopped

  baikal:
    image: ckulka/baikal:nginx
    container_name: baikal
    ports:
      - 5232:80
    volumes:
      - ./baikal/config:/var/www/baikal/config
      - ./baikal/data:/var/www/baikal/Specific
    restart: unless-stopped

  prometheus-exporter:
    image: python:3.12-alpine
    container_name: prometheus-exporter
    ports:
      - 9091:9091
    volumes:
      - ./prometheus-exporter/server.py:/server.py:ro
    command: python /server.py
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - 3002:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/grafana-dashboards:ro
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    restart: unless-stopped

  memos:
    image: neosmemo/memos:stable
    container_name: memos
    ports:
      - 5230:5230
    volumes:
      - ./memos/data:/var/opt/memos
    restart: unless-stopped

  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    ports:
      - 3456:3456
    volumes:
      - ./vikunja/files:/app/vikunja/files
      - ./vikunja/db:/db
    environment:
      - VIKUNJA_SERVICE_PUBLICURL=http://${SERVER_IP}:3456
      - VIKUNJA_DATABASE_TYPE=sqlite
      - VIKUNJA_DATABASE_PATH=/db/vikunja.db
    restart: unless-stopped

  firefly:
    image: fireflyiii/core:latest
    container_name: firefly
    ports:
      - 3005:8080
    volumes:
      - firefly-upload:/var/www/html/storage/upload
    environment:
      - TZ=${TZ}
      - APP_KEY=${FIREFLY_APP_KEY}
      - APP_URL=http://${SERVER_IP}:3005
      - TRUSTED_PROXIES=**
      - DB_CONNECTION=mysql
      - DB_HOST=firefly-db
      - DB_PORT=3306
      - DB_DATABASE=firefly
      - DB_USERNAME=firefly
      - DB_PASSWORD=${FIREFLY_DB_PASSWORD}
    depends_on:
      - firefly-db
    restart: unless-stopped

  firefly-importer:
    image: fireflyiii/data-importer:latest
    container_name: firefly-importer
    ports:
      - 3006:8080
    environment:
      - TZ=${TZ}
      - FIREFLY_III_URL=http://firefly:8080
      - VANITY_URL=http://${SERVER_IP}:3005
      - FIREFLY_III_ACCESS_TOKEN=${FIREFLY_IMPORTER_TOKEN}
      - TRUSTED_PROXIES=**
    depends_on:
      - firefly
    restart: unless-stopped

  firefly-db:
    image: mariadb:11
    container_name: firefly-db
    volumes:
      - firefly-db:/var/lib/mysql
    environment:
      - TZ=${TZ}
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=firefly
      - MYSQL_USER=firefly
      - MYSQL_PASSWORD=${FIREFLY_DB_PASSWORD}
    restart: unless-stopped

  miniflux:
    image: miniflux/miniflux:latest
    container_name: miniflux
    ports:
      - 3007:8080
    environment:
      - TZ=${TZ}
      - DATABASE_URL=postgres://miniflux:${MINIFLUX_DB_PASSWORD}@miniflux-db/miniflux?sslmode=disable
      - RUN_MIGRATIONS=1
      - CREATE_ADMIN=1
      - ADMIN_USERNAME=${MINIFLUX_ADMIN_USERNAME}
      - ADMIN_PASSWORD=${MINIFLUX_ADMIN_PASSWORD}
      - BASE_URL=http://${SERVER_IP}:3007/
    depends_on:
      miniflux-db:
        condition: service_healthy
    restart: unless-stopped

  miniflux-db:
    image: postgres:16-alpine
    container_name: miniflux-db
    volumes:
      - miniflux-db:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=miniflux
      - POSTGRES_PASSWORD=${MINIFLUX_DB_PASSWORD}
      - POSTGRES_DB=miniflux
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "miniflux"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3010:3000
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=192.168.2.100:3010,100.121.230.17:3010
    restart: unless-stopped

  # Vaultwarden — self-hosted, Bitwarden-compatible password vault. Local-only
  # for now (DOMAIN = LAN URL). To expose later: set DOMAIN=https://vault.senya.ca,
  # add a route in traefik/dynamic/routes.yml (NO authelia middleware — it breaks
  # the Bitwarden clients), and a Cloudflare hostname → http://traefik:80.
  # NOTE: the web vault/apps need HTTPS to log in; over a plain-http LAN IP the
  # browser crypto is blocked, so use https://localhost:8222 or expose via HTTPS.
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    ports:
      - "8222:80"
    volumes:
      - ./vaultwarden/data:/data
    environment:
      - TZ=${TZ}
      - DOMAIN=http://${SERVER_IP}:8222
      # Leave signups on to create your account, then set to false and recreate.
      - SIGNUPS_ALLOWED=true
      # Unlocks the /admin panel. Random hex token in .env (swap for an argon2
      # hash via `docker run --rm -it vaultwarden/server /vaultwarden hash` later).
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
    restart: unless-stopped

  # Custom-built Senya apps (built from local source, not pulled images).
  senya-landing:
    build: ./senya-landing
    image: senya-landing:latest
    container_name: senya-landing
    ports:
      - "8090:80"
    # Static site: nothing on disk should ever change at runtime.
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  senyatasks:
    build: ./senyatasks
    image: senyatasks:latest
    container_name: senyatasks
    ports:
      - "8000:8000"
    volumes:
      - ./senyatasks/data:/data
    restart: unless-stopped

  senya-daily:
    build: ./senya-daily
    image: senya-daily:latest
    container_name: senya-daily
    ports:
      - "8001:8001"
    volumes:
      - ./senya-daily/data:/data
    restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
  firefly-db:
  firefly-upload:
  miniflux-db:

# Single self-managed network so `docker compose up` works from scratch with no
# pre-created network. Keeps the stable name so cloudflared/homepage routing and
# any standalone per-service compose files attach to the same network by name.
networks:
  default:
    name: homelab_default
