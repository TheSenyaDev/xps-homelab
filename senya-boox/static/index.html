<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SenyaBoox</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app no-file" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="side-head">
        <h1>📖 Boox Notes</h1>
        <div class="side-actions">
          <button class="ghost small" id="refresh-btn" title="Refresh list">⟳</button>
        </div>
      </div>
      <input class="filter" id="filter" placeholder="Filter notes…" />
      <div class="tree" id="tree"></div>
      <div class="side-foot" id="health">
        <div class="health-row"><span class="dot"></span><span class="label">…</span></div>
        <div class="health-detail" id="health-detail"></div>
      </div>
    </aside>

    <main class="viewer">
      <div class="toolbar">
        <button class="ghost small" id="toggle-side" title="Toggle sidebar">☰</button>
        <span class="cur-path" id="cur-path"></span>
        <div class="tools">
          <div class="zoombar">
            <button class="ghost small" id="zoom-out" title="Zoom out">−</button>
            <button class="ghost small" id="zoom-fit" title="Fit to width"><span id="zoom-pct">100%</span></button>
            <button class="ghost small" id="zoom-in" title="Zoom in">+</button>
          </div>
          <a class="ghost small" id="open-btn" target="_blank" rel="noopener" title="Open raw in new tab">↗</a>
          <a class="ghost small" id="download-btn" title="Download">↓</a>
        </div>
      </div>
      <div class="stage" id="stage">
        <div class="pdf-wrap" id="pdf-wrap"></div>
      </div>
      <div class="empty" id="empty">
        <div>Select a note to view</div>
        <div class="dim">PDFs your Boox synced over WebDAV appear in the sidebar.<br>
          Scroll to pan · Ctrl/⌘+scroll or pinch to zoom · double-click to zoom in.</div>
      </div>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
