apiVersion: 1

groups:
  - orgId: 1
    name: homelab-performance
    folder: General
    interval: 1m
    rules:

      - uid: homelab-cpu-high
        title: High CPU Usage
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: homelab_cpu_usage_percent{type="total"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator: { params: [85], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: CPU usage above 85% for 5 minutes
        labels: {}
        isPaused: false

      - uid: homelab-ram-high
        title: High RAM Usage
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: homelab_ram_usage_percent
              instant: true
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator: { params: [90], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: RAM usage above 90% for 5 minutes
        labels: {}
        isPaused: false

      - uid: homelab-disk-high
        title: High Disk Usage
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: homelab_disk_usage_percent{device="/dev/nvme0n1p2"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator: { params: [90], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: SSD usage above 90%
        labels: {}
        isPaused: false

      - uid: homelab-cpu-temp-high
        title: High CPU Temperature
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: homelab_cpu_temp_celsius
              instant: true
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator: { params: [85], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: CPU temperature above 85°C for 2 minutes
        labels: {}
        isPaused: false

      - uid: homelab-gpu-temp-high
        title: High GPU Temperature
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: homelab_gpu_temp_celsius
              instant: true
              refId: A
          - refId: B
            datasourceUid: "-100"
            model:
              type: threshold
              refId: B
              expression: A
              conditions:
                - evaluator: { params: [85], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
                  type: query
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: GPU temperature above 85°C for 2 minutes
        labels: {}
        isPaused: false
