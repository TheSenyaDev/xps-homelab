; CouchDB configuration for Obsidian "Self-hosted LiveSync".
; Mounted at /opt/couchdb/etc/local.d/00-livesync.ini (sorts before the image's
; docker.ini so CouchDB writes runtime config/secrets there, not into this file).
; These are the settings the LiveSync plugin requires (auth on every request +
; CORS for the Obsidian apps + large request/document sizes for big notes).
; Admin credentials come from COUCHDB_USER / COUCHDB_PASSWORD (root .env).

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
require_valid_user = true
max_http_request_size = 4294967296
bind_address = 0.0.0.0

[chttpd_auth]
require_valid_user = true

[httpd]
enable_cors = true

[cors]
origins = app://obsidian.md,capacitor://localhost,http://localhost
credentials = true
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
