# Decide whether the request reached us over an internal network, based on the
# Host header (how the client connected): private LAN ranges, Tailscale CGNAT
# (100.64.0.0/10), or localhost. A public tunnel sends its hostname → not internal.
map $host $internal_client {
    default                                          0;
    localhost                                        1;
    "~^127\."                                        1;
    "~^10\."                                         1;
    "~^192\.168\."                                   1;
    "~^172\.(1[6-9]|2[0-9]|3[01])\."                 1;
    "~^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\." 1;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # This page contains no secrets and no backend, but we lock it down anyway.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;

    # Read-only static site: only GET/HEAD make sense.
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # Internal-only: the list of services + internal IPs. Public/tunnel requests
    # (non-internal Host) get 404, so topology is never disclosed externally.
    location = /services.js {
        if ($internal_client = 0) { return 404; }
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
        autoindex off;
    }
}
