# Decide whether the request reached us over an internal network, based on the
# Host header (how the client connected): private LAN ranges, Tailscale CGNAT
# (100.64.0.0/10), or localhost. A public tunnel sends its hostname → not internal.
map $host $internal_client {
    default                                          0;
    localhost                                        1;
    "~^127\."                                        1;
    "~^10\."                                         1;
    "~^192\.168\."                                   1;
    "~^172\.(1[6-9]|2[0-9]|3[01])\."                 1;
    "~^100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\." 1;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, so proxy_pass upstreams (e.g. the glances container)
    # are re-resolved at runtime rather than pinned to a stale IP at startup.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Serve UTF-8 so emoji icons in app.js / services.js decode correctly.
    # (With nosniff set, a missing charset makes browsers mis-decode multi-byte
    # emoji as Latin-1 → icons vanish.) Default charset_types covers JS/CSS/HTML.
    charset utf-8;

    # This page contains no secrets and no backend, but we lock it down anyway.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self' https://api.open-meteo.com; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;

    # Read-only static site: only GET/HEAD make sense.
    if ($request_method !~ ^(GET|HEAD)$) { return 405; }

    # Internal-only: the list of services + internal IPs. Public/tunnel requests
    # (non-internal Host) get 404, so topology is never disclosed externally.
    location = /services.js {
        if ($internal_client = 0) { return 404; }
        try_files $uri =404;
    }

    # Live system stats: reverse-proxy each host's Glances REST API same-origin
    # so the page can fetch /stats/<host>/<plugin> without CORS and with a tight
    # CSP (connect-src 'self'). Internal-only, like services.js: public/tunnel
    # requests get 404 so host addresses are never exposed externally.
    #
    # XPS power + accurate CPU temp: the power-api reads RAPL watts and the
    # x86_pkg_temp thermal zone (same source Grafana uses), which Glances doesn't
    # expose correctly. Exact-match so it takes priority over the prefix below.
    location = /stats/xps/power {
        if ($internal_client = 0) { return 404; }
        set $power_api "http://power-api:8081";
        rewrite ^.*$ / break;
        proxy_pass $power_api;
    }

    # XPS (this host): the glances container on the shared docker network.
    location /stats/xps/ {
        if ($internal_client = 0) { return 404; }
        set $glances_xps "http://glances:61208";
        rewrite ^/stats/xps/(.*)$ /api/4/$1 break;
        proxy_pass $glances_xps;
    }

    # TrueNAS: install Glances on it (TrueNAS SCALE: add the Glances app, or run
    # `nicolargo/glances -w`) and replace the IP below with your TrueNAS address.
    location /stats/truenas/ {
        if ($internal_client = 0) { return 404; }
        set $glances_truenas "http://192.168.2.82:30015";   # <-- TrueNAS IP:port
        rewrite ^/stats/truenas/(.*)$ /api/4/$1 break;
        proxy_pass $glances_truenas;
    }

    location / {
        try_files $uri $uri/ =404;
        autoindex off;
    }
}
