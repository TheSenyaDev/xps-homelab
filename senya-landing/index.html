<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senya</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/compact.css" />
</head>
<body>
  <main>
    <header class="top">
      <h1>🚀 Senya</h1>
      <div class="top-right">
        <div id="view-toggle" class="view-toggle" role="group" aria-label="View density">
          <button type="button" data-view="comfortable">Comfortable</button>
          <button type="button" data-view="compact">Compact</button>
        </div>
        <p id="clock" class="clock"></p>
      </div>
    </header>

    <form id="search" class="search">
      <div class="engines">
        <label data-engine="google"><input type="radio" name="engine" value="google" /> Google</label>
        <label data-engine="searxng"><input type="radio" name="engine" value="searxng" checked /> SearXNG</label>
      </div>
      <div class="search-row">
        <input id="q" type="text" placeholder="Search the web…" autocomplete="off" autofocus />
        <button type="submit">Search</button>
      </div>
    </form>

    <section id="weather-section">
      <h2>Weather <span id="weather-locs" class="weather-locs"></span></h2>
      <div id="weather" class="weather"></div>
    </section>

    <section id="system-section">
      <h2>System <span class="hint">· live</span></h2>
      <div id="system" class="system"></div>
    </section>

    <section id="public-section">
      <h2>Public <span class="hint">· senya.ca</span></h2>
      <div id="public" class="grid"></div>
    </section>

    <section id="bookmarks-section">
      <h2>Bookmarks</h2>
      <div id="bookmarks" class="grid"></div>
    </section>

    <section id="services-section">
      <h2>Services <span class="hint">· local / tailscale</span></h2>
      <div id="services" class="services"></div>
    </section>
  </main>

  <!-- services.js is a classic script gated by nginx to LAN/Tailscale: on public
       it 404s, window.SENYA_INTERNAL stays undefined, and the internal-only
       sections remove themselves. It must run before the module below; deferred
       scripts (classic defer + modules) execute in document order. -->
  <script src="services.js" defer></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
