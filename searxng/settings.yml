use_default_settings: true

general:
  instance_name: "SearXNG"
  debug: false

server:
  secret_key: "change_this_to_a_random_secret_key"
  bind_address: "0.0.0.0"
  port: 8080
  base_url: false
  image_proxy: true

ui:
  default_theme: simple
  default_locale: en
  infinite_scroll: true

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: bing
    engine: bing
    shortcut: b
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
  - name: youtube
    engine: youtube_noapi
    shortcut: yt
  - name: reddit
    engine: reddit
    shortcut: r
